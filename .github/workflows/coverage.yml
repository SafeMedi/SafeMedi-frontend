name: Test Coverage

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run test coverage
        run: yarn test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Comment coverage report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const MARKER = "<!-- safemedi-coverage-report -->";
            const summaryPath = path.join(process.cwd(), "coverage", "coverage-summary.json");

            if (!fs.existsSync(summaryPath)) {
              core.setFailed("coverage-summary.json not found.");
              return;
            }

            const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
            const total = summary.total ?? {};

            const toPct = (value) =>
              typeof value === "number" ? `${value.toFixed(2)}%` : "-";

            const pullNumber = context.payload.pull_request.number;
            const filesResponse = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const changedFiles = filesResponse.data
              .filter((file) => file.status !== "removed")
              .map((file) => file.filename);

            const summaryEntries = Object.entries(summary).filter(([key]) => key !== "total");
            const resolveCoverageEntry = (filename) =>
              summaryEntries.find(([absolutePath]) =>
                absolutePath.replace(/\\/g, "/").endsWith(`/${filename}`),
              );

            const changedCoverageRows = changedFiles
              .map((filename) => {
                const entry = resolveCoverageEntry(filename);
                if (!entry) {
                  return `| \`${filename}\` | - | - | - | - |`;
                }
                const [, metrics] = entry;
                return [
                  `| \`${filename}\``,
                  toPct(metrics.lines?.pct),
                  toPct(metrics.statements?.pct),
                  toPct(metrics.functions?.pct),
                  toPct(metrics.branches?.pct),
                  "|",
                ].join(" | ");
              })
              .slice(0, 30);

            const changedCoverageBody =
              changedCoverageRows.length > 0
                ? changedCoverageRows.join("\n")
                : "| (변경 파일 없음) | - | - | - | - |";

            const body = [
              MARKER,
              "## 테스트 커버리지 리포트",
              "",
              "### Overall",
              "",
              "| Metric | Coverage |",
              "| --- | ---: |",
              `| Lines | ${toPct(total.lines?.pct)} |`,
              `| Statements | ${toPct(total.statements?.pct)} |`,
              `| Functions | ${toPct(total.functions?.pct)} |`,
              `| Branches | ${toPct(total.branches?.pct)} |`,
              "",
              "### Changed Files",
              "",
              "| File | Lines | Statements | Functions | Branches |",
              "| --- | ---: | ---: | ---: | ---: |",
              changedCoverageBody,
              "",
              "> coverage artifact: `coverage-report`",
            ].join("\n");

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              per_page: 100,
            });

            const previous = comments.data.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(MARKER),
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                body,
              });
            }
