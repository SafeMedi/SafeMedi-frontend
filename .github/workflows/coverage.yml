name: Test Coverage

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run test coverage
        id: coverage_run
        continue-on-error: true
        run: yarn test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

      - name: Comment coverage report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const MARKER = "<!-- safemedi-coverage-report -->";
            const summaryPath = path.join(process.cwd(), "coverage", "coverage-summary.json");
            const THRESHOLDS = {
              lines: 60,
              statements: 60,
              functions: 60,
              branches: 60,
            };
            const ICON_PASS = "🟢";
            const ICON_FAIL = "🔴";
            const runOutcome = "${{ steps.coverage_run.outcome }}";

            const hasSummary = fs.existsSync(summaryPath);
            const summary = hasSummary ? JSON.parse(fs.readFileSync(summaryPath, "utf8")) : null;
            const total = summary?.total ?? {};

            const toPct = (value) =>
              typeof value === "number" ? `${value.toFixed(2)}%` : "-";

            const metricRow = (label, key) => {
              const pct = total?.[key]?.pct;
              if (typeof pct !== "number") {
                return `| ${label} | - | ${ICON_FAIL} | 기준 ${THRESHOLDS[key]}% |`;
              }
              const passed = pct >= THRESHOLDS[key];
              const icon = passed ? ICON_PASS : ICON_FAIL;
              return `| ${label} | ${toPct(pct)} | ${icon} | 기준 ${THRESHOLDS[key]}% |`;
            };

            const overallStatusIcon = runOutcome === "success" ? ICON_PASS : ICON_FAIL;
            const overallStatusText = runOutcome === "success" ? "통과" : "실패";

            const body = [
              MARKER,
              "## 테스트 커버리지 리포트",
              "",
              `- 전체 워크플로우 상태: ${overallStatusIcon} **${overallStatusText}**`,
              "",
              "### Overall",
              "",
              "| Metric | Coverage | Status | Threshold |",
              "| --- | ---: | :---: | ---: |",
              metricRow("Lines", "lines"),
              metricRow("Statements", "statements"),
              metricRow("Functions", "functions"),
              metricRow("Branches", "branches"),
              "",
              hasSummary
                ? "> coverage artifact: `coverage-report`"
                : "> coverage-summary.json을 찾지 못했습니다. 테스트 단계 로그를 확인해 주세요.",
              "",
              runOutcome === "success"
                ? "> 최소 커버리지 기준을 통과했습니다."
                : "> 최소 커버리지 기준 미달 또는 테스트 실패로 워크플로우가 실패했습니다.",
            ].join("\n");

            const pullNumber = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              per_page: 100,
            });

            const previous = comments.data.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(MARKER),
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                body,
              });
            }

      - name: Fail workflow when coverage step failed
        if: steps.coverage_run.outcome == 'failure'
        run: exit 1
